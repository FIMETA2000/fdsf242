<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>georgesodini.com</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Tahoma, Arial, sans-serif;
    }

    .window {
      width: 1200px;
      height: 680px;
      background: #d6d6d6;
      border: 4px solid #111;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
    }

    .title-bar {
      height: 58px;
      background: #07135a;
      color: #c8c8c8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      font-size: 34px;
      box-sizing: border-box;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    .btn {
      width: 44px;
      height: 38px;
      background: #777;
      border: 3px solid #111;
      color: #111;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .menu {
      height: 60px;
      background: #d6d6d6;
      border-bottom: 4px solid #111;
      display: flex;
      align-items: center;
      gap: 52px;
      padding-left: 22px;
      font-size: 34px;
      color: #111;
    }

    .content {
      height: calc(100% - 118px);
      background: #f2f2f2;
      padding: 18px 22px;
      box-sizing: border-box;
      font-size: 34px;
      color: #111;
      outline: none;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.35;
    }

    .content:empty::before {
      content: "December 22nd, 2008:";
      color: #111;
    }
  </style>
</head>

<body>
  <div class="window">
    <div class="title-bar">
      <div>georgesodini.com</div>
      <div class="buttons">
        <div class="btn">−</div>
        <div class="btn">□</div>
        <div class="btn">×</div>
      </div>
    </div>

    <div class="menu">
      <span>File</span>
      <span>Edit</span>
      <span>Format</span>
      <span>Insert</span>
      <span>Help</span>
    </div>

    <div class="content" contenteditable="true"></div>
  </div>
</body>
</html>
